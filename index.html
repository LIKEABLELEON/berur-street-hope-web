
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding and viewport settings for responsive design -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Page title displayed in browser tab -->
    <title>Berur Street Care International - Transforming Lives Through God's Love</title>
    
    <!-- SEO meta tags for search engine optimization -->
    <meta name="description" content="Christian-based non-profit organization rehabilitating street children and families through food, accommodation, education, and hope." />
    <meta name="author" content="Berur Street Care International" />

    <!-- Open Graph meta tags for social media sharing -->
    <meta property="og:title" content="Berur Street Care International - Transforming Lives Through God's Love" />
    <meta property="og:description" content="Christian-based non-profit organization rehabilitating street children and families through food, accommodation, education, and hope." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter Card meta tags for Twitter sharing -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Facebook SDK initialization container -->
    <div id="fb-root"></div>
    
    <!-- Facebook JavaScript SDK script for social plugins -->
    <!-- This enables Facebook post embedding and other social features -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0"></script>
    
    <!-- Main React application mount point -->
    <div id="root"></div>
    
    <!-- Vite development server and build entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
